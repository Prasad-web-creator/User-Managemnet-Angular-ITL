    <div class="forgot-password-container fade-in">
      <div class="forgot-password-card">
        <div class="card-header">
          <div class="icon-circle">
            <fa-icon [icon]="faLock"></fa-icon>
          </div>
          <h2>Reset Password</h2>
          <p>Please enter your email and your new password to reset your account.</p>
        </div>


        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="reset-form">
          <div class="form-group">
            <label for="email">Email address</label>
            <div class="input-wrapper">
              <fa-icon [icon]="faEnvelope" class="input-icon"></fa-icon>
              <input 
                type="email" 
                id="email" 
                formControlName="email" 
                placeholder="Enter your registered email"
                class="with-icon"
              >
            </div>
            <div class="error" *ngIf="resetForm.get('email')?.touched && resetForm.get('email')?.errors?.['required']">Email is required</div>
            <div class="error" *ngIf="resetForm.get('email')?.touched && resetForm.get('email')?.errors?.['email']">Please enter a valid email</div>
          </div>


          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="input-wrapper">
              <input 
                [type]="showNewPassword ? 'text' : 'password'" 
                id="newPassword" 
                formControlName="newPassword" 
                placeholder="Minimum 6 characters"
              >
              <button type="button" class="password-toggle" (click)="showNewPassword = !showNewPassword">
                <fa-icon [icon]="showNewPassword ? faEyeSlash : faEye"></fa-icon>
              </button>
            </div>
            <div class="error" *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.errors?.['required']">New password is required</div>
            <div class="error" *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.errors?.['minlength']">Password must be at least 6 characters</div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <div class="input-wrapper">
              <input 
                [type]="showConfirmPassword ? 'text' : 'password'" 
                id="confirmPassword" 
                formControlName="confirmPassword" 
                placeholder="Re-type new password"
              >
              <button type="button" class="password-toggle" (click)="showConfirmPassword = !showConfirmPassword">
                <fa-icon [icon]="showConfirmPassword ? faEyeSlash : faEye"></fa-icon>
              </button>
            </div>
            <div class="error" *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.get('confirmPassword')?.errors?.['required']">Confirmation is required</div>
            <div class="error" *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched">Passwords do not match</div>
          </div>


          <div class="form-actions">
            <button type="submit" [disabled]="resetForm.invalid || isLoading" class="btn-submit">
              <span *ngIf="!isLoading">Update Password</span>
              <span *ngIf="isLoading" class="loader"></span>
            </button>
            <a routerLink="/login" class="back-to-login">Back to Login</a>
          </div>
        </form>
      </div>
    </div>
