<div class="roles-container" *ngIf="permissions$ | async as perms">
  <div class="header">
    <div class="title-section">
      <h1>Role Management</h1>
      <p>Assign screen access and permissions to different roles</p>
    </div>
    <button mat-flat-button color="primary" (click)="openRoleDialog()" *ngIf="perms.roles">
      <mat-icon>add</mat-icon>
      Create New Role
    </button>
  </div>

  <mat-card class="table-card">
    <div class="loading-shade" *ngIf="loading$ | async">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource">
        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Role Name</th>
          <td mat-cell *matCellDef="let role">
            <span class="role-badge" [ngClass]="role.name.toLowerCase()">{{ role.name }}</span>
          </td>
        </ng-container>

        <!-- Description Column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let role">{{ role.description || 'No description provided' }}</td>
        </ng-container>

        <!-- Permissions Column -->
        <ng-container matColumnDef="permissions">
          <th mat-header-cell *matHeaderCellDef>Screen Permissions</th>
          <td mat-cell *matCellDef="let role">
            <div class="permission-chips">
              <span class="chip" *ngFor="let p of role.permissions | keyvalue">
                <mat-icon *ngIf="p.value" color="primary" class="check">check_circle</mat-icon>
                <mat-icon *ngIf="!p.value" color="warn" class="cancel">cancel</mat-icon>
                {{ p.key }}
              </span>
            </div>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let role">
            <button mat-icon-button color="primary" matTooltip="Edit Role" (click)="openRoleDialog(role)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" matTooltip="Delete Role" (click)="deleteRole(role)" [disabled]="role.name === 'Admin'">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card>
</div>
