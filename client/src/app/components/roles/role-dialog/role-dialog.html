<h2 mat-dialog-title>{{ isEdit ? 'Edit Role' : 'Create New Role' }}</h2>
<form [formGroup]="roleForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Role Name</mat-label>
        <input matInput formControlName="name" placeholder="e.g. Manager" [readonly]="isEdit && data?.name === 'Admin'">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="3" placeholder="Describe the responsibilities of this role"></textarea>
      </mat-form-field>

      <div class="permissions-section">
        <h3>Screen Permissions</h3>
        <p>Select which modules this role can access and interact with.</p>
        
        <div class="checkbox-group" formGroupName="permissions">
          <mat-checkbox formControlName="dashboard">Dashboard</mat-checkbox>
          <mat-checkbox formControlName="viewUsers">View Users</mat-checkbox>
          <mat-checkbox formControlName="editUsers">Edit Users</mat-checkbox>
          <mat-checkbox formControlName="deleteUsers">Delete Users</mat-checkbox>
          <mat-checkbox formControlName="addUser">Create User Access</mat-checkbox>
          <mat-checkbox formControlName="roles">Role Management</mat-checkbox>
          <mat-checkbox formControlName="viewActivityLog">Activity Log Access</mat-checkbox>
          <mat-checkbox formControlName="teams">Teams Management</mat-checkbox>
          <mat-checkbox formControlName="projects">Projects Access</mat-checkbox>
        </div>
      </div>
    </div>
  </mat-dialog-content>
  
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="dialogRef.close()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="roleForm.invalid">
      {{ isEdit ? 'Update Role' : 'Create Role' }}
    </button>
  </mat-dialog-actions>
</form>
