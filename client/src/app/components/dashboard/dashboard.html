<div class="dashboard-container fade-in">
  <!-- Loading Overlay -->
  <div class="loading-overlay" *ngIf="dataService.loading$ | async">
    <div class="spinner"></div>
    <p>Syncing dashboard data...</p>
  </div>
  <!-- Stats Header -->
  <div class="stats-grid">
    <div *ngFor="let stat of (stats$ | async)" class="stat-card">
      <div class="stat-icon" [style.background-color]="stat.color + '15'" [style.color]="stat.color">
        <fa-icon [icon]="getIcon(stat.icon)"></fa-icon>
      </div>
      <div class="stat-content">
        <span class="stat-label">{{ stat.label }}</span>
        <div class="stat-value-group">
          <span class="stat-value">{{ stat.value }}</span>
          <span class="stat-change" [class.positive]="!stat.change.includes('-')">
            {{ stat.change }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts Section -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-header">
        <h3>Users by Role</h3>
        <p>Distribution of user permissions</p>
      </div>
      <div class="chart-body">
        <canvas #roleChart></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <h3>Department Diversity</h3>
        <p>Headcount across business units</p>
      </div>
      <div class="chart-body">
        <canvas #deptChart></canvas>
      </div>
    </div>
  </div>

  <!-- Recent Action / Navigation -->
  <div class="quick-actions">
    <div class="action-card" routerLink="/add-user" *ngIf="isAdmin">
      <div class="action-icon primary">
        <fa-icon [icon]="getIcon('users')"></fa-icon>
      </div>
      <div class="action-info">
        <h4>Register New User</h4>
        <p>Expand your team and manage roles</p>
      </div>
      <div class="action-arrow">→</div>
    </div>

    
    <div class="action-card" routerLink="/users">
      <div class="action-icon success">
        <fa-icon [icon]="getIcon('building')"></fa-icon>
      </div>
      <div class="action-info">
        <h4>Manage Directory</h4>
        <p>View all active user certificates</p>
      </div>
      <div class="action-arrow">→</div>
    </div>
  </div>
</div>
