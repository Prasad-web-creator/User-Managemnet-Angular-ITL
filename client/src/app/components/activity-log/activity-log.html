<div class="activity-container">
  <div class="header">
    <div class="title-section">
      <fa-icon [icon]="faHistory" class="header-icon"></fa-icon>
      <h1>Activity Log</h1>
    </div>
    <p>Track all administrative and user actions across the system</p>
  </div>

  <mat-card class="table-card">
    <div class="loading-shade" *ngIf="isLoading">
      <span>Loading logs...</span>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="activities">
        
        <!-- Timestamp Column -->
        <ng-container matColumnDef="timestamp">
          <th mat-header-cell *matHeaderCellDef> Time </th>
          <td mat-cell *matCellDef="let element"> {{element.timestamp | date:'MMM d, y, h:mm a'}} </td>
        </ng-container>

        <!-- User Column -->
        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef> User </th>
          <td mat-cell *matCellDef="let element"> 
            <div class="user-cell">
              <span class="username">{{element.username}}</span>
            </div>
          </td>
        </ng-container>

        <!-- Action Column -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef> Action </th>
          <td mat-cell *matCellDef="let element">
            <span class="action-chip" [ngClass]="getActionColor(element.action)">
              {{element.action}}
            </span>
          </td>
        </ng-container>

        <!-- Target Column -->
        <ng-container matColumnDef="target">
          <th mat-header-cell *matHeaderCellDef> Target </th>
          <td mat-cell *matCellDef="let element"> {{element.target}} </td>
        </ng-container>

        <!-- Details Column -->
        <ng-container matColumnDef="details">
          <th mat-header-cell *matHeaderCellDef> Details </th>
          <td mat-cell *matCellDef="let element" class="details-cell"> {{element.details}} </td>
        </ng-container>

        <!-- IP Column - HIDDEN -->

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- No Data Row -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="5">No activity logs found.</td>
        </tr>
      </table>
    </div>
  </mat-card>
</div>
